name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-tests:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pytest pytest-asyncio httpx
          pip install -r requirements.txt || true
      - name: Run pytest
        run: pytest tests/ -v --tb=short

  frontend-lint:
    name: Frontend (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint

  frontend-build:
    name: Frontend (build)
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci
      - run: npm run build

  e2e-tests:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Python deps
        run: |
          pip install playwright pytest pytest-asyncio httpx
          playwright install --with-deps chromium
      - name: Install frontend deps
        working-directory: dashboard
        run: |
          npm ci
          npm run build
      - name: Start backend
        run: |
          uvicorn app:app --host 0.0.0.0 --port 8000 &
          sleep 3
      - name: Serve frontend
        working-directory: dashboard
        run: |
          npm run preview -- --host 0.0.0.0 --port 5175 &
          sleep 5
      - name: Run Playwright smoke
        run: python3 tests/e2e/full.py --only smoke
        env:
          DASHBOARD_URL: http://localhost:5175
          BACKEND_URL: http://localhost:8000